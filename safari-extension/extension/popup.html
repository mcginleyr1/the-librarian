<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Librarian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 320px;
      background: #1d2330;
      color: #e2e8f0;
    }
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-title { font-weight: 600; font-size: 14px; }
    .header-icon { font-size: 16px; }
    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    label { display: block; font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    input, select, textarea {
      width: 100%;
      padding: 6px 8px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #667eea; }
    select option { background: #2d3748; }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    .mode-btn {
      padding: 6px 4px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 5px;
      color: #94a3b8;
      font-size: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .mode-btn:hover { background: #3d4f66; color: #e2e8f0; }
    .mode-btn.active { background: #667eea; border-color: #667eea; color: white; font-weight: 600; }
    .mode-icon { font-size: 14px; display: block; margin-bottom: 2px; }
    .save-btn {
      width: 100%;
      padding: 9px;
      background: #667eea;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #5a6fd6; }
    .save-btn:disabled { background: #4a5568; cursor: not-allowed; }
    .status {
      text-align: center;
      padding: 6px;
      border-radius: 5px;
      font-size: 12px;
      display: none;
    }
    .status.success { background: #1a3a2a; color: #68d391; display: block; }
    .status.error { background: #3a1a1a; color: #fc8181; display: block; }
    .api-url-row { display: flex; gap: 6px; align-items: flex-end; }
    .api-url-row input { flex: 1; }
    .settings-toggle {
      font-size: 11px;
      color: #667eea;
      cursor: pointer;
      text-align: right;
      text-decoration: none;
    }
    .settings-toggle:hover { text-decoration: underline; }
    #settings-panel { display: none; }
    #settings-panel.open { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📚</span>
    <span class="header-title">Save to Librarian</span>
  </div>

  <div class="body">
    <div>
      <label>API URL</label>
      <input id="api-url" type="text" placeholder="https://librarian.tailf742b.ts.net" />
    </div>

    <div>
      <label>Title</label>
      <input id="title" type="text" placeholder="Page title..." />
    </div>

    <div>
      <label>Clip Mode</label>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="selection">
          <span class="mode-icon">✂️</span>Selection
        </button>
        <button class="mode-btn" data-mode="full_article">
          <span class="mode-icon">📄</span>Article
        </button>
        <button class="mode-btn" data-mode="full_page">
          <span class="mode-icon">🌐</span>Full Page
        </button>
        <button class="mode-btn" data-mode="screenshot">
          <span class="mode-icon">📷</span>Screenshot
        </button>
        <button class="mode-btn" data-mode="pdf">
          <span class="mode-icon">📎</span>PDF
        </button>
      </div>
    </div>

    <div>
      <label>Notebook</label>
      <select id="notebook">
        <option value="">— no notebook —</option>
      </select>
    </div>

    <div>
      <label>Tags <span style="color:#4a5568;font-weight:400">(comma-separated)</span></label>
      <input id="tags" type="text" placeholder="elixir, papers, interesting" />
    </div>

    <button id="save-btn" class="save-btn">Save to Vault</button>
    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
