# IMPORTANT: Replace placeholder values before applying!
#
# Better: create secrets from CLI (never commit real values):
#   just k-create-secrets <db-password>
#
# Or manually:
#   kubectl create secret generic librarian-secrets -n librarian \
#     --from-literal=db-user=librarian \
#     --from-literal=db-password=YOUR_DB_PASSWORD \
#     --from-literal=secret-key-base=$(mix phx.gen.secret) \
#     --from-literal=database-url=ecto://librarian:YOUR_DB_PASSWORD@postgres:5432/librarian_prod
apiVersion: v1
kind: Secret
metadata:
  name: librarian-secrets
  namespace: librarian
type: Opaque
stringData:
  db-user: "librarian"
  db-password: "CHANGE_ME_TO_A_REAL_PASSWORD"
  secret-key-base: "GENERATE_WITH_mix_phx.gen.secret"
  database-url: "ecto://librarian:CHANGE_ME_TO_A_REAL_PASSWORD@postgres:5432/librarian_prod"
